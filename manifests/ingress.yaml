# Traefik Middleware for stripping /knowledge prefix
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: knowledge-stripprefix
  namespace: smap
spec:
  stripPrefix:
    prefixes:
      - /knowledge

---
# Traefik IngressRoute for HTTPS routing (K3s uses IngressRoute for middleware support)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: knowledge-ingress
  namespace: smap
  labels:
    app.kubernetes.io/name: knowledge
    app.kubernetes.io/part-of: smap
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`smap-api.tantai.dev`) && PathPrefix(`/knowledge`)
      kind: Rule
      services:
        - name: knowledge-api
          port: 80
      middlewares:
        - name: knowledge-stripprefix
