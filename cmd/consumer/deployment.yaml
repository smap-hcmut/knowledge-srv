apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-consumer
  namespace: smap
  labels:
    app: knowledge-consumer
    version: v1
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: knowledge-consumer
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: knowledge-consumer
        version: v1
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: knowledge-consumer
          image: registry.tantai.dev/smap/knowledge-consumer:260316-235017
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          envFrom:
            - configMapRef:
                name: knowledge-config
            - secretRef:
                name: knowledge-secrets
          env:
            - name: CONTAINER_NAME
              value: "knowledge-consumer"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
      terminationGracePeriodSeconds: 60
      restartPolicy: Always
